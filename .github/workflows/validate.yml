name: Validate

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  hassfest:
    name: Hassfest
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Hassfest
        uses: home-assistant/actions/hassfest@master

  lint:
    name: Ruff
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - run: |
          python -m pip install --upgrade pip
          pip install ruff

      - run: ruff check custom_components

  mypy:
    name: MyPy
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - run: |
          python -m pip install --upgrade pip
          pip install mypy

      - run: mypy custom_components || true