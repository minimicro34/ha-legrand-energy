name: CI

on:
  push:
  pull_request:

jobs:
  quality:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: |
          python -m pip install -U pip
          pip install pytest ruff

      - name: Compile
        run: python -m compileall custom_components

      - name: Ruff
        run: ruff check .

      - name: Pytest
        run: pytest -v